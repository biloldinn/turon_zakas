services:
  - type: web
    name: turon-bot-webapp
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "bash start.sh"
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.12"
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: CARD_NUMBER
        sync: false
      - key: CARD_OWNER
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: WEBAPP_URL
        sync: false
